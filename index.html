<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="style.css">
    
    <!-- <link rel="stylesheet" href="https://kit.fontawesome.com/c20b45ff2b.css" crossorigin="anonymous"> -->
    <script src="https://kit.fontawesome.com/c20b45ff2b.js" crossorigin="anonymous"></script>

    <title>OhMyFood Paris</title>
</head>


<body>
  <header>
    <nav>
      <img src="Images et textes Ohmyfood/images/logo/ohmyfood.png" class="logo" alt="">
    </nav>

  </header>




  <section class="one">
    <div class="location">
      <p>
        <span><i class="fas fa-solid fa-location-dot"></i></span> Paris, Belleville
      </p>
    </div>

    <article class="hero">
      <h1>Réservez le menu qui vous convient</h1>
      <p>Découvrez des restaurants d’exception, sélectionnés par nos soins.</p>
      <a href="#">Explorer nos restaurants</a>

    </article>
  </section>


  <section class="two">
    <article class="fonctionnement">
      <h2>Fonctionnement</h2>

      <div class="etapes">
        <ul>
          <li>
            <span>1</span>
            <i class="fa-solid fa-mobile-screen-button"></i>
            Choisissez un restaurant
          </li>

          <li>
            <span>2</span>
            <i class="fa-solid fa-list-ul"></i>
            Composez votre menu
          </li>

          <li>
            <span>3</span>
            <i class="fa-sharp fa-solid fa-store"></i>
            Dégustez au restaurant
          </li>
        </ul>
      </div>

    </article>
  </section>



  <section class="three">
    <article class="restaurants">
      <h2>Restaurants</h2>
      <a href="" class="card">
        <img src="Images et textes Ohmyfood/images/restaurants/jay-wennington-N_Y88TWmGwA-unsplash.jpg" alt="">
        <!-- <div class="content">
          <div class="info-resto">
            <h3>La palette du goût</h3>
            <p>Ménilmontant</p>
          </div>
          <i class="fa-regular fa-heart"></i>
        </div> -->
      </a>




    
    </article>
  </section>
    
</body>
</html>
